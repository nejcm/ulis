# yaml-language-server: $schema=../node_modules/@nejcm/ulis/schemas/permissions.schema.json

claude:
  defaultMode: default
  allow:
    - Bash(bun lint*)
    - Bash(bun add *)
    - Bash(bun install)
  deny: []
  ask: []
opencode:
  permission:
    read: allow
    edit: ask
    glob: allow
    grep: allow
    list: allow
    bash:
      "*": ask
      bun test:*: allow
      cc:*: allow
      comm:*: allow
      find*: allow
    skill:
      "*": ask
      read-*: allow
      search-*: allow
      internal-*: deny
    webfetch: allow
    websearch: allow
    codesearch: allow
    external_directory: ask
    doom_loop: ask
codex:
  approvalMode: on-request
  sandbox: elevated
cursor:
  mcpAllowlist:
    - "*:*"
  terminalAllowlist:
    - git
    - npm
    - bun
    - find
    - ls
