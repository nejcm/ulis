name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: "🚀 Build & Publish"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.head_commit.message, 'chore(release):') ||
      contains(github.event.head_commit.message, '[release]')

    steps:
      - name: "🛎️ Checkout"
        uses: actions/checkout@v6

      - name: "🥟 Setup Bun"
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: "📦 Install dependencies"
        run: bun install --frozen-lockfile

      - name: "🧹 Lint"
        run: bun run lint

      - name: "🧪 Test"
        run: bun run test

      - name: "🏗️ Build"
        run: bun run build

      - name: "🏷️ Extract version from package.json"
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PRERELEASE=$(node -p "require('./package.json').version.match(/-(\\w+)/)?.[1] ?? ''")
          DIST_TAG=${PRERELEASE:-latest}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"

      - name: "🔖 Create and push tag"
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ steps.pkg.outputs.version }}$"; then
            echo "Tag v${{ steps.pkg.outputs.version }} already exists, skipping."
          else
            git tag "v${{ steps.pkg.outputs.version }}"
            git push origin "v${{ steps.pkg.outputs.version }}"
          fi

      - name: "📦 Setup Node for npm"
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          scope: "@nejcm"

      - name: "🔐 Verify npm auth"
        run: |
          npm config set @nejcm:registry https://registry.npmjs.org/
          npm whoami
          npm ping
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: "📤 Publish to npm"
        run: |
          npm config set @nejcm:registry https://registry.npmjs.org/
          npm publish --access public --tag ${{ steps.pkg.outputs.dist_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: "🎉 Create GitHub Release"
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ steps.pkg.outputs.version }}"
          generate_release_notes: true
